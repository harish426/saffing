name: Build and Push to Docker Hub

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend Base image
        uses: docker/build-push-action@v5
        with:
          context: back_processor/mailing_system
          file: back_processor/mailing_system/Dockerfile.base
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/staffing-backend-base:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/staffing-backend-base:cache
          cache-to: type=inline

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: back_processor/mailing_system
          file: back_processor/mailing_system/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/marketing-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/marketing-backend:${{ github.sha }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: marketing_data_base/Marketing
          file: marketing_data_base/Marketing/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/marketing-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/marketing-frontend:${{ github.sha }}
