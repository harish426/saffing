version: '3.8'

services:
  web:
    build: .
    container_name: marketing_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - HOSTNAME=0.0.0.0
    restart: always

# If you want to run a postgres database container alongside:
